# Reference nginx config - NOT deployed yet (no VPS/domain provisioned, see
# project notes). Replace ubazaar.uz below with the real domain, and make
# sure it matches the backend's BASE_DOMAIN env var exactly - that's what
# packages/backend/src/middleware/resolveTenant.ts compares the Host header
# against to resolve a tenant by subdomain.
#
# Topology: one Node backend process (port 4000, via PM2 or the Docker
# compose service) behind three static-site server blocks - admin, landing,
# and a wildcard one for every seller's storefront subdomain.
#
# THE IMPORTANT PART: every `location /api/` and `location /uploads/` block
# below sets `proxy_set_header Host $host;` explicitly. Without it, nginx's
# default proxy behaviour can substitute its own upstream host, and the
# backend would resolve the wrong tenant (or no tenant at all) for every
# storefront API call - this is the exact same Host-header bug already hit
# once with Vite's dev proxy (see project notes), just at the nginx layer
# instead. Do not remove this line when editing any of the three blocks.

upstream bazaar_backend {
    server 127.0.0.1:4000;
}

# --- Admin (app.ubazaar.uz) ---------------------------------------------
# Admin authenticates via JWT, not Host-header tenant resolution (see
# requireAuth in the backend), so the Host header here doesn't need to
# match any tenant subdomain - it's just the app's own fixed hostname.
server {
    listen 80;
    server_name app.ubazaar.uz;

    root /var/www/bazaar/packages/admin/dist;
    index index.html;

    location /api/ {
        proxy_pass http://bazaar_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://bazaar_backend;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- Landing (ubazaar.uz, www.ubazaar.uz) --------------------------------
server {
    listen 80;
    server_name ubazaar.uz www.ubazaar.uz;

    root /var/www/bazaar/packages/landing/dist;
    index index.html;

    location /api/ {
        proxy_pass http://bazaar_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- Storefront (every other *.ubazaar.uz) ------------------------------
# Regex server_name so it only matches when nothing above matched first -
# nginx always prefers an exact server_name match (app./www./bare domain)
# over a regex one, so this is safe as a catch-all for tenant subdomains.
server {
    listen 80;
    server_name ~^(?<tenant_subdomain>.+)\.ubazaar\.uz$;

    root /var/www/bazaar/packages/storefront/dist;
    index index.html;

    location /api/ {
        proxy_pass http://bazaar_backend;
        # Critical: preserves "<shop>.ubazaar.uz" as the Host header so
        # resolveTenant.ts can look the tenant up by subdomain. Every
        # storefront API call (catalog, checkout) depends on this.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://bazaar_backend;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
